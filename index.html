<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>ARR Attendance Mobile Web App</title>
  <style>
    * { box-sizing: border-box; }
    body{font-family:system-ui,-apple-system,sans-serif;margin:0;padding:0;background:#f5f9fa;display:flex;flex-direction:column;height:100vh;-webkit-text-size-adjust:none;}
    #app{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 16px;width:100%;max-width:480px;margin:0 auto;}
    .step {margin-bottom:20px;text-align:center;font-weight:bold;color:#555;font-size:1.1rem;}
    #location-check-btn,
    #capture-btn,
    #id-form button[type="submit"]{width:100%;padding:16px 24px;margin:8px 0;border:none;border-radius:12px;background:#4a90d9;color:#fff;font-size:1.1rem;font-weight:600;cursor:pointer;touch-action:manipulation;-webkit-appearance:none;transition:background .2s;}
    #location-check-btn:active,
    #capture-btn:active,
    #id-form button[type="submit"]:active{background:#3a7bc8;}
    #geolocation-status,#result{text-align:center;margin-top:16px;font-size:1rem;color:#333;min-height:24px;}
    #geolocation-status.success{color:#2ecc71;font-weight:bold;}
    #geolocation-status.error{color:#e74c3c;font-weight:bold;}
    #id-form{width:100%;margin-top:16px;}
    #id-form label{display:block;margin-bottom:8px;font-size:1rem;color:#555;font-weight:500;}
    #employee-id{width:100%;padding:14px 16px;margin-bottom:8px;border:2px solid #d0d7de;border-radius:8px;font-size:1.1rem;-webkit-appearance:none;background:#fff;transition:border-color .2s;}
    #employee-id:focus{border-color:#4a90d9;outline:none;}
    #camera-section{width:100%;margin-top:20px;text-align:center;}
    #cam-video{width:100%;max-width:360px;border-radius:12px;background:#333;}
    #download-link{display:block;margin-top:16px;padding:14px 24px;text-align:center;color:#4a90d9;text-decoration:none;font-size:1rem;border:2px solid #4a90d9;border-radius:8px;transition:background .2s;}
    #download-link:hover{background:#eef4fa;}
  </style>
</head>
<body>
<div id="app">
  <div class="step" id="stepIndicator">Step 1 of 3: Check Location</div>
  <button id="location-check-btn">Check Location</button>
  <div id="geolocation-status"></div>
  <form id="id-form" style="display:none;">
    <label for="employee-id">Employee ID:</label>
    <input type="text" id="employee-id" placeholder="Enter your employee ID" autocomplete="off" />
    <button type="submit">Confirm</button>
  </form>
  <div id="camera-section" style="display:none;">
    <video id="cam-video" autoplay muted playsinline></video>
    <br/>
    <button id="capture-btn">Capture Face</button>
  </div>
  <div id="result" style="display:none;"></div>
  <a id="download-link" href="#" download="attendance.csv" style="display:none;">Download Attendance Log</a>
</div>
<script type="module">
import { checkLocation } from './src/services/geolocation.js';
import { initCamera, captureImage } from './src/services/cameraCapture.js';
import { initFaceAPI, compareFaces } from './src/lib/facenet.js';
import { logAttendance, downloadCSV } from './src/services/csvLogger.js';

const officeLat = 13.77591720691935;
const officeLng = 100.53495484101782;
let currentStep = 1;
const stepIndicator=document.getElementById('stepIndicator');
function setStep(n){currentStep=n;stepIndicator.textContent=`Step ${n} of 3: ${getStepLabel(n)}`;}
function getStepLabel(n){return ["Check Location","Enter Employee ID","Capture Face"][n-1];}

document.getElementById('location-check-btn').addEventListener('click', async ()=>{
  const ok = await checkLocation(officeLat, officeLng,15);
  const statusEl=document.getElementById('geolocation-status');
  statusEl.textContent=ok?"Within 15m. Good.":"Outside allowed radius. Aborting.";
  statusEl.className=ok?'success':'error';
  if(!ok){return;}
  setStep(2);
  document.getElementById('id-form').style.display='block';
});

document.getElementById('id-form').addEventListener('submit', async (e)=>{
  e.preventDefault();
  const id = document.getElementById('employee-id').value.trim();

  // Check if portrait images exist for this employee ID using Image objects
  const portraits = [`${id}_front.jpg`, `${id}_left.jpg`, `${id}_right.jpg`];
  let hasPortraits = false;

  for (const img of portraits) {
    try {
      await new Promise((resolve) => {
        const testImg = new Image();
        testImg.onload = () => { hasPortraits = true; resolve(true); };
        testImg.onerror = () => { resolve(false); }; // image not found, continue checking
        testImg.src = `assets/images/${img}?${Date.now()}`; // cache bust
      });
    } catch (err) {
      console.warn(`Image check failed for ${img}:`, err.message);
    }
    if (hasPortraits) break;
  }

  if (!hasPortraits) {
    const resultEl=document.getElementById('result');
    resultEl.style.display='block';
    resultEl.textContent=`No portrait found for employee ID: ${id}`;
    resultEl.className='error';
    return;
  }

  setStep(3);
  document.getElementById('camera-section').style.display='block';
  try {
    await initCamera();
  } catch (err) {
    console.error('Failed to start camera:', err);
    const resultEl=document.getElementById('result');
    resultEl.style.display='block';
    resultEl.textContent='Camera access denied. Please allow camera and try again.';
    resultEl.className='error';
  }
});

const captureBtn=document.getElementById('capture-btn');
captureBtn.addEventListener('click', async ()=>{
  const imgBlob=await captureImage();
  await initFaceAPI();
  const id=document.getElementById('employee-id').value;
  const resultEl=document.getElementById('result');

  try {
    const match = await compareFaces(imgBlob, id);
    if (match) {
      resultEl.style.display='block';
      resultEl.textContent='Attendance logged!';
      resultEl.className='success';
      logAttendance(id,new Date().toISOString());
      downloadCSV();
    } else {
      resultEl.style.display='block';
      resultEl.textContent='Face not recognized. Reject.';
      resultEl.className='error';
    }
  } catch (err) {
    console.error('Face comparison error:', err);
    resultEl.style.display='block';
    resultEl.textContent=`Face comparison failed: ${err.message}`;
    resultEl.className='error';
  }
});
</script>
</body>
</html>
