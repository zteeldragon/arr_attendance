<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>ARR Attendance Mobile Web App</title>
  <style>
    * { box-sizing: border-box; }
    body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;margin:0;padding:0;background:linear-gradient(180deg,#00040c 0%,#001233 40%,#002d5a 70%,#00b4d6 100%);display:flex;flex-direction:column;height:100vh;-webkit-text-size-adjust:none;color:#fff;}
    #app{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 16px;width:100%;max-width:480px;margin:0 auto;}
    .step{margin-bottom:32px;text-align:center;font-weight:600;color:rgba(255,255,255,0.7);font-size:0.95rem;letter-spacing:1px;text-transform:uppercase;}
    #location-check-btn,
    #capture-btn,
    #id-form button[type="submit"]{width:100%;padding:16px 24px;margin:8px 0;border:none;border-radius:16px;background:rgba(255,255,255,0.1);color:#fff;font-size:1.1rem;font-weight:600;cursor:pointer;touch-action:manipulation;-webkit-appearance:none;transition:background .2s,opacity .2s;backdrop-filter:blur(10px);}
    #location-check-btn:hover,
    #capture-btn:hover,
    #id-form button[type="submit"]:hover{background:rgba(255,255,255,0.18);}
    #location-check-btn:active,
    #capture-btn:active,
    #id-form button[type="submit"]:active{background:rgba(255,255,255,0.06);opacity:0.8;}
    #location-check-btn[disabled],
    #location-check-btn:disabled{background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.4);cursor:not-allowed;}
    #geolocation-status,#result{text-align:center;margin-top:16px;font-size:1rem;min-height:24px;}
    #geolocation-status.success{color:#34e8a0;font-weight:bold;}
    #geolocation-status.error{color:#ff6b6b;font-weight:bold;}
    #id-form{width:100%;margin-top:16px;}
    #id-form label{display:block;margin-bottom:10px;font-size:0.85rem;color:rgba(255,255,255,0.6);font-weight:500;letter-spacing:1.5px;text-transform:uppercase;}
    #employee-id{width:100%;padding:16px 20px;margin-bottom:8px;border:none;border-radius:16px;font-size:1.1rem;-webkit-appearance:none;background:rgba(255,255,255,0.15);color:#fff;transition:border-color .2s;}
    #employee-id::placeholder{color:rgba(255,255,255,0.4);}
    #employee-id:focus{border:none;outline:2px solid rgba(255,255,255,0.3);background:rgba(255,255,255,0.2);}
    #camera-section{width:100%;margin-top:20px;text-align:center;}
    #cam-video{width:100%;max-width:360px;border-radius:16px;background:#000;display:block;}
    #download-link{display:block;margin-top:16px;padding:14px 24px;text-align:center;color:rgba(255,255,255,0.8);text-decoration:none;font-size:1rem;border:2px solid rgba(255,255,255,0.3);border-radius:16px;transition:background .2s;}
    #download-link:hover{background:rgba(255,255,255,0.1);}
  </style>
</head>
<body>
<div id="app">
  <div class="step" id="stepIndicator">Step 1 of 3: Check Location</div>
  <button id="location-check-btn">Check Location</button>
  <div id="geolocation-status"></div>
  <form id="id-form" style="display:none;">
    <label for="employee-id">Employee ID:</label>
    <input type="text" id="employee-id" placeholder="Enter your employee ID" autocomplete="off" />
    <button type="submit">Confirm</button>
  </form>
  <div id="camera-section" style="display:none;">
    <video id="cam-video" autoplay muted playsinline></video>
    <br/>
    <button id="capture-btn">Capture Face</button>
  </div>
  <div id="result" style="display:none;"></div>
  <div id="debug-log" style="display:none;margin-top:16px;font-size:0.75rem;text-align:left;background:rgba(0,0,0,0.4);color:#34e8a0;padding:12px;border-radius:12px;max-height:300px;overflow:auto;word-break:break-all;border:1px solid rgba(255,255,255,0.1);"></div>
  <a id="download-link" href="#" download="attendance.csv" style="display:none;">Download Attendance Log</a>
</div>
<script type="module">
import { checkLocation } from './src/services/geolocation.js';
import { initCamera, captureImage } from './src/services/cameraCapture.js';
import { initFaceAPI, compareFaces } from './src/lib/facenet.js';
import { logAttendance, downloadCSV } from './src/services/csvLogger.js';

// Verify imports succeeded
const missing = [];
if (typeof checkLocation !== 'function') missing.push('checkLocation');
if (typeof captureImage !== 'function') missing.push('captureImage');
if (typeof compareFaces !== 'function') missing.push('compareFaces');
if (typeof logAttendance !== 'function') missing.push('logAttendance');
if (missing.length > 0) {
  console.error('[FATAL] ES module import failed. Missing:', missing.join(', '));
  const app = document.getElementById('app');
  app.innerHTML = '<h2 style="color:#ff6b6b;">Module Import Failed</h2><p style="color:rgba(255,255,255,0.7);">Missing: ' + missing.join(', ') + '</p><p style="color:rgba(255,255,255,0.5);font-size:0.9rem;">This usually means .js files are not served with application/javascript MIME type.</p>';
}

const officeLat = 13.77591720691935;
const officeLng = 100.53495484101782;
let currentStep = 1;
const stepIndicator=document.getElementById('stepIndicator');
function setStep(n){currentStep=n;stepIndicator.textContent=`Step ${n} of 3: ${getStepLabel(n)}`;}
function getStepLabel(n){return ["Check Location","Enter Employee ID","Capture Face"][n-1];}

const locationBtn=document.getElementById('location-check-btn');
locationBtn.addEventListener('click', async ()=>{
  locationBtn.disabled=true;
  locationBtn.textContent='Checking location...';
  const ok = await checkLocation(officeLat, officeLng,15);
  const statusEl=document.getElementById('geolocation-status');
  if(!ok){
    statusEl.textContent='Outside allowed radius. Aborting.';
    statusEl.className='error';
    locationBtn.disabled=false;
    locationBtn.textContent='Check Location';
    return;
  }
  statusEl.textContent='Location verified ✓';
  statusEl.className='success';
  setTimeout(()=>{statusEl.style.display='none';},2000);
  setStep(2);
  document.getElementById('id-form').style.display='block';
});

document.getElementById('id-form').addEventListener('submit', async (e)=>{
  e.preventDefault();
  const id = document.getElementById('employee-id').value.trim();

  // Check if portrait images exist for this employee ID using Image objects
  const portraits = [`${id}_front.jpg`, `${id}_left.jpg`, `${id}_right.jpg`];
  let hasPortraits = false;

  for (const img of portraits) {
    const exists = await new Promise((resolve) => {
      const testImg = new Image();
      testImg.onload = () => resolve(true);
      testImg.onerror = () => resolve(false);
      testImg.src = `assets/images/${img}?${Date.now()}`; // cache bust
    });
    console.log(`Portrait check ${img}: ${exists ? 'EXISTS' : 'NOT FOUND'}`);
    if (exists) {
      hasPortraits = true;
      break;
    }
  }

  if (!hasPortraits) {
    const resultEl=document.getElementById('result');
    resultEl.style.display='block';
    resultEl.textContent=`No portrait found for employee ID: ${id}`;
    resultEl.className='error';
    return;
  }

  setStep(3);
  document.getElementById('camera-section').style.display='block';
  try {
    await initCamera();
  } catch (err) {
    console.error('Failed to start camera:', err);
    const resultEl=document.getElementById('result');
    resultEl.style.display='block';
    resultEl.textContent='Camera access denied. Please allow camera and try again.';
    resultEl.className='error';
  }
});

  debugEl.style.display='block';

    if (typeof compareFaces !== 'function') {
      throw new Error('compareFaces is NOT defined! ES module import may have failed. Check console for errors.');
    }

    debugEl.textContent += '\n[DEBUG] compareFaces returned: ' + match;

      resultEl.textContent='Attendance logged!';
      resultEl.className='success';
      logAttendance(id,new Date().toISOString());
      downloadCSV();
    } else {
      resultEl.style.display='block';
      resultEl.textContent='Face not recognized. Reject.';
      resultEl.className='error';
    }
